  debugger:
    name: CMSIS-DAP@pyOCD
    protocol: swd
    clock: 10000000
    dbgconf: ../.cmsis/mdk_demo+Target_1.dbgconf
    gdbserver:
      - port: 3333
  debug-vars:
    vars: |
      __var TRCK_value      = 0x00000001;   // Trace Clock operating frequency /1
  debug-sequences:
    - name: EnableTraceClock
      blocks:
        - execute: |
            Write16( 0x4001E3FE, 0xA501 ) ;  // set PRCR, bit PRC0
            Write8( 0x4001E03F, 0x80 | TRCK_value ) ;  // set TRCKCR, bit TRCKEN and TRCK[]
            Write16( 0x4001E3FE, 0xA500 ) ;  // clear PRCR, bit PRC0
    - name: DebugDeviceUnlock
      blocks:
        - execute: |
            __var trace_enabled = ( __traceout & 0x3 ) != 0 ; // TPIU or SWO Trace Selected?
        - if: trace_enabled
          execute: |
            Sequence("EnableTraceClock");
    - name: ConfigureTraceTPIUPins
      blocks:
        - execute: |
            __var parallel_trace_port_size = ( __traceout & 0x003F0000 ) >> 16 ;
            Write8( 0x40080D03, 0x00 ) ;  // clear PWPR, bit B0WI
            Write8( 0x40080D03, 0x40 ) ;  // set PWPR, bit PFSWE
            Write32( 0x400808B8, 0x1A010C00 ) ;  // P214: TCLK
        - info: TPIU port width 1
          if: parallel_trace_port_size >= 1
          execute: |
            Write32( 0x400808AC, 0x1A010C00 ) ;  // P211: TDATA0
        - info: TPIU port width 2
          if: parallel_trace_port_size >= 2
          execute: |
            Write32( 0x400808A8, 0x1A010C00 ) ;  // P210: TDATA1
        - info: TPIU port width 4
          if: parallel_trace_port_size >= 4
          execute: |
            Write32( 0x400808A4, 0x1A010C00 ) ;  // P209: TDATA2
            Write32( 0x400808A0, 0x1A010C00 ) ;  // P208: TDATA3
        - execute: |
            Write8( 0x40080D03, 0x00);  // clear PWPR, bit PFSWE
            Write8( 0x40080D03, 0x80);  // set PWPR, bit B0WI
    - name: TraceStart
      blocks:
        - execute: |
            __var tpiu_trace_enabled = ( __traceout & 0x2 ) != 0 ; // TPIU Trace Selected?
            Sequence( "EnableTraceClock" ) ;
        - if: tpiu_trace_enabled
          execute: |
            Sequence( "ConfigureTraceTPIUPins" ) ;
  programming:
