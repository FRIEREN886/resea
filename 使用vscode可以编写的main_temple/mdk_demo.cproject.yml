project:
  packs:
    - pack: Renesas::RA_DFP@^4.5.0
  setups:
    - setup: Options for Target_1
      processor:
        fpu: sp
        trustzone: non-secure
      add-path:
        - main
        - ra_gen
        - ra
        - ra_cfg
      debug: "on"
      define:
        - __MICROLIB
      define-asm:
        - __MICROLIB
      misc:
        - C:
            - -std=c99
          C-CPP:
            - -fno-rtti
            - -funsigned-char
            - -ffunction-sections
            - -Wno-license-management -Wunused -Wuninitialized -Wall -Wextra
              -Wmissing-declarations -Wconversion -Wpointer-arith -Wshadow
              -Waggregate-return -Wfloat-equal
          CPP:
            - -xc++
            - -std=c++11
            - -fno-exceptions
          ASM:
            - -masm=auto
          Link:
            - --library_type=microlib
            - --map
            - --load_addr_map_info
            - --xref
            - --callgraph
            - --symbols
            - --info sizes
            - --info totals
            - --info unused
            - --info veneers
            - --entry=Reset_Handler --no_startup
              --via="C:/Users/32991/Desktop/mian/script/ac6/fsp_keep.via"
            - --diag_suppress=6319,6314
            - --summary_stderr
            - --info summarysizes
  linker:
    - script: script/fsp.scat
  groups:
    - group: main  code
      files:
        - file: main/circular_queue.c
        - file: main/FSP_UART.c
        - file: main/BSP_IIC_EEPROM.c
        - file: main/BSP_BQ76920_I2C.c
        - file: main/BSP_WIFI.c
